spring:
  application:
    name: log-monitor
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

log-monitor:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ssh:
    connection-timeout-ms: ${SSH_CONNECTION_TIMEOUT_MS:30000}
    command-timeout-ms: ${SSH_COMMAND_TIMEOUT_MS:60000}
    max-retries: ${SSH_MAX_RETRIES:3}
    retry-delay-ms: ${SSH_RETRY_DELAY_MS:2000}
    known-hosts-path: ${SSH_KNOWN_HOSTS_PATH:}
  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY}

---
# Local development profile
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:logmonitor}
    username: ${DB_USERNAME:logmonitor}
    password: ${DB_PASSWORD:logmonitor}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    show-sql: true

log-monitor:
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-key-min-32-chars!!}
  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY:local-dev-encryption-key-32b!}

logging:
  level:
    root: INFO
    com.logmonitor: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

---
# Development profile
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000

logging:
  level:
    root: INFO
    com.logmonitor: DEBUG

---
# UAT profile
spring:
  config:
    activate:
      on-profile: uat
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

logging:
  level:
    root: WARN
    com.logmonitor: INFO

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    root: WARN
    com.logmonitor: INFO
    org.springframework: WARN
